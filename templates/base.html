<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hotel Reservation{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Blue Harbor Hotel</p>
          <h1>Reserve a room in minutes</h1>
        </div>
        <nav class="topnav">
          <a href="{{ url_for('index') }}">Search</a>
          <a href="{{ url_for('cancel_form') }}">Cancel</a>
        </nav>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
